<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DesignFlow Connector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0F0F0F;
    color: #FFFFFE;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }

  button, input, a { -webkit-app-region: no-drag; }

  /* Title bar */
  .titlebar {
    height: 38px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid #1E1E2E;
    flex-shrink: 0;
  }
  .titlebar-dots {
    display: flex;
    gap: 6px;
    margin-right: 12px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-red { background: #EF4444; }
  .dot-yellow { background: #FACC15; }
  .dot-green { background: #22C55E; }
  .titlebar-text {
    font-size: 11px;
    color: #525868;
    flex: 1;
    text-align: center;
  }

  /* Header */
  .header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid #1E1E2E;
    flex-shrink: 0;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .logo {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, #7F5AF0, #2CB67D);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand {
    font-size: 16px;
    font-weight: 600;
  }
  .brand span { color: #7F5AF0; }
  .subtitle {
    font-size: 11px;
    color: #525868;
    margin-top: 2px;
  }

  /* Status cards */
  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 16px 20px;
    flex-shrink: 0;
  }
  .status-card {
    background: #16161A;
    border: 1px solid #1E1E2E;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .status-card .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #525868;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .status-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .status-dot.connected { background: #2CB67D; }
  .status-dot.connecting { background: #FACC15; animation: pulse 1.5s infinite; }
  .status-dot.disconnected { background: #525868; }
  .status-text {
    font-size: 11px;
    color: #94A1B2;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Log area */
  .log-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 20px 16px;
    overflow: hidden;
  }
  .log-header {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #525868;
    font-weight: 600;
    padding: 12px 0 8px;
    flex-shrink: 0;
  }
  .log-area {
    flex: 1;
    background: #0A0A0A;
    border: 1px solid #1E1E2E;
    border-radius: 10px;
    padding: 10px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    line-height: 1.8;
  }
  .log-entry { padding: 1px 0; }
  .log-time { color: #2A2A3C; margin-right: 6px; }
  .log-info { color: #525868; }
  .log-success { color: #2CB67D; }
  .log-error { color: #EF4444; }
  .log-warn { color: #FACC15; }

  /* Auth section */
  .auth-section {
    padding: 0 20px 16px;
    flex-shrink: 0;
  }
  .auth-input-group {
    display: flex;
    gap: 8px;
  }
  .auth-input {
    flex: 1;
    padding: 10px 12px;
    background: #16161A;
    border: 1px solid #1E1E2E;
    border-radius: 8px;
    color: #FFFFFE;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
  }
  .auth-input:focus { border-color: rgba(127, 90, 240, 0.5); }
  .auth-input::placeholder { color: #525868; }
  .auth-btn {
    padding: 10px 16px;
    background: #7F5AF0;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .auth-btn:hover { background: #6B46E5; }

  /* Footer */
  .footer {
    padding: 10px 20px;
    border-top: 1px solid #1E1E2E;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .footer-text {
    font-size: 10px;
    color: #2A2A3C;
  }
  .footer-link {
    font-size: 10px;
    color: #7F5AF0;
    text-decoration: none;
    cursor: pointer;
  }
  .footer-link:hover { color: #9B7AF8; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2A2A3C; border-radius: 2px; }
</style>
</head>
<body>

<!-- Title bar (macOS style) -->
<div class="titlebar">
  <div class="titlebar-dots">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
  </div>
  <span class="titlebar-text">DesignFlow Connector</span>
</div>

<!-- Header -->
<div class="header">
  <div class="logo-row">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <div>
      <div class="brand">Design<span>Flow</span> Connector</div>
      <div class="subtitle">Desktop bridge for Figma & After Effects</div>
    </div>
  </div>
</div>

<!-- Status Grid -->
<div class="status-grid">
  <div class="status-card">
    <div class="label">Cloud</div>
    <div class="status-indicator">
      <div id="cloudDot" class="status-dot disconnected"></div>
      <span id="cloudText" class="status-text">Off</span>
    </div>
  </div>
  <div class="status-card">
    <div class="label">Figma</div>
    <div class="status-indicator">
      <div id="figmaDot" class="status-dot disconnected"></div>
      <span id="figmaText" class="status-text">Off</span>
    </div>
  </div>
  <div class="status-card">
    <div class="label">After Effects</div>
    <div class="status-indicator">
      <div id="aeDot" class="status-dot connected"></div>
      <span id="aeText" class="status-text">Watching</span>
    </div>
  </div>
</div>

<!-- Auth -->
<div class="auth-section">
  <div class="auth-input-group">
    <input id="tokenInput" class="auth-input" type="text" placeholder="Enter session key (e.g. kamlesh-studio)...">
    <button class="auth-btn" onclick="saveToken()">Sync Session</button>
  </div>
</div>

<!-- Logs -->
<div class="log-section">
  <div class="log-header">Activity Log</div>
  <div class="log-area" id="logArea">
    <div class="log-entry log-info"><span class="log-time">--:--</span>Waiting to start...</div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <span class="footer-text">v1.0.0 · ws://localhost:3003</span>
  <a class="footer-link" onclick="openDashboard()">Open Dashboard ↗</a>
</div>

<script>
  // ── Status Updates ──
  if (window.connector) {
    window.connector.onStatusUpdate((status) => {
      updateDot("cloud", status.cloud);
      updateDot("figma", status.figma);
      updateDot("ae", status.ae);
    });

    window.connector.onLogEntry((entry) => {
      addLog(entry.message, entry.type);
    });

    // Load initial status
    window.connector.getStatus().then((status) => {
      updateDot("cloud", status.cloud || "disconnected");
      updateDot("figma", status.figma || "disconnected");
      updateDot("ae", status.ae || "watching");
    });
  }

  function updateDot(id, state) {
    const dot = document.getElementById(id + "Dot");
    const text = document.getElementById(id + "Text");
    if (!dot || !text) return;

    dot.className = "status-dot " + (state || "disconnected");
    const labels = {
      connected: "Connected",
      connecting: "Connecting...",
      disconnected: "Off",
      watching: "Watching",
      idle: "Idle",
    };
    text.textContent = labels[state] || state || "Off";
  }

  function addLog(msg, type) {
    const area = document.getElementById("logArea");
    const entry = document.createElement("div");
    entry.className = "log-entry log-" + (type || "info");
    const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    entry.innerHTML = '<span class="log-time">' + now + "</span>" + msg;
    area.appendChild(entry);
    area.scrollTop = area.scrollHeight;

    // Keep last 50 entries
    while (area.children.length > 50) {
      area.removeChild(area.firstChild);
    }
  }

  function saveToken() {
    const token = document.getElementById("tokenInput").value.trim();
    if (!token) return;
    if (window.connector) {
      window.connector.setAuthToken(token).then(() => {
        addLog("Auth token saved — connecting to cloud...", "success");
        document.getElementById("tokenInput").value = "";
      });
    } else {
      addLog("Running outside Electron — token saved locally", "warn");
    }
  }

  function openDashboard() {
    if (window.connector) {
      window.connector.openExternal("https://app.designflow.io/dashboard");
    } else {
      window.open("http://localhost:3000/dashboard", "_blank");
    }
  }
</script>
</body>
</html>
